<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Notinha — Drive conectado</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="notinha-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --border:#30363d;
    --brand:#288A89; --brand-hover:#2EA09E; --brand-soft:#288A8922;
    --text:#e6edf3; --muted:#8b949e; --accent:#f0f6fc; --danger:#f85149;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; font-weight:300; line-height:1.65; min-height:100vh;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(800px circle at 20% 0%, rgba(40,138,137,0.08), transparent 40%),
      radial-gradient(600px circle at 80% 30%, rgba(40,138,137,0.05), transparent 50%);
  }
  .wrap { max-width:560px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }
  header { padding:20px 0; border-bottom:1px solid var(--border); }
  header .wrap { max-width:980px; display:flex; justify-content:center; }
  .logo { display:inline-flex; align-items:center; gap:10px; text-decoration:none; }
  .logo img { height:34px; }
  .logo-text { font-family:'Plus Jakarta Sans',sans-serif; font-weight:500; font-size:24px; color:var(--accent); }

  main { padding:64px 0 80px; }
  .box {
    background:var(--surface); border:1px solid var(--brand); border-radius:20px;
    padding:44px 40px; text-align:center;
  }
  .check {
    width:68px; height:68px; margin:0 auto 22px; border-radius:50%;
    background:var(--brand-soft); border:2px solid var(--brand);
    display:flex; align-items:center; justify-content:center;
    color:var(--brand); font-size:34px; font-weight:700;
  }
  .check.err { color:var(--danger); border-color:var(--danger); background:#f8514922; }
  h1 { font-family:'Fraunces',serif; font-weight:600; font-size:28px; color:var(--accent); margin-bottom:12px; letter-spacing:-0.02em; }
  p { color:var(--muted); font-size:15px; margin-bottom:14px; }
  p b { color:var(--accent); font-weight:500; }
  .cta {
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    margin-top:10px; padding:16px 32px; background:var(--brand); color:#fff;
    text-decoration:none; font-weight:600; font-size:16px; border-radius:100px;
    transition:background .2s, transform .2s;
  }
  .cta:hover { background:var(--brand-hover); transform:translateY(-1px); }
  .codigo { margin-top:24px; color:var(--muted); font-size:13px; }
  .codigo b { color:var(--accent); letter-spacing:0.06em; }
  footer { padding:32px 0; border-top:1px solid var(--border); color:var(--muted); font-size:13px; text-align:center; }
  footer a { color:var(--muted); text-decoration:none; margin:0 10px; }
  footer a:hover { color:var(--brand); }
  .legal { margin-top:14px; }
  @media (max-width:560px){ .box{ padding:32px 24px; } h1{ font-size:24px; } }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <a href="index.html" class="logo">
      <img src="notinha-icon.png" alt="Notinha">
      <span class="logo-text">Notinha<sup style="font-size:0.45em; font-weight:400; vertical-align:top; margin-left:1px;">™</sup></span>
    </a>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="box" id="box"><!-- preenchido via JS --></div>
  </div>
</main>

<footer>
  <div class="wrap" style="max-width:980px;">
    <a href="privacidade.html">Política de Privacidade</a>
    <a href="termos.html">Termos de Uso</a>
    <a href="contato/">Contato</a>
    <div class="legal">© 2026 Notinha · CNPJ 66.824.150/0001-28</div>
  </div>
</footer>

<script>
  const BOT_WHATSAPP = "5513996286090";
  const params = new URLSearchParams(location.search);
  const code = params.get("code");
  const email = params.get("email");
  const erro = params.get("erro");
  const box = document.getElementById("box");

  const ERROS = {
    cancelado: "Você cancelou a autorização do Google. Sem isso, o Notinha não consegue guardar suas notas no seu Drive.",
    link: "O link de conexão veio incompleto. Volte ao cadastro e tente conectar o Drive novamente.",
    token: "Não foi possível concluir o acesso ao seu Drive. Tente conectar novamente.",
    inesperado: "Algo deu errado por aqui. Tente novamente em instantes.",
  };

  if (code) {
    const wa = "https://wa.me/" + BOT_WHATSAPP + "?text=" + encodeURIComponent("ATIVAR " + code);
    box.innerHTML =
      '<div class="check">&#10003;</div>' +
      '<h1>Drive conectado!</h1>' +
      '<p>Criamos a pasta <b>Notinha</b> e a planilha no seu Google Drive' +
        (email ? ' (<b>' + email + '</b>)' : '') + '.</p>' +
      '<p>Último passo: toque no botão e <b>envie a mensagem</b> que abrir, pra ativar seu WhatsApp.</p>' +
      '<a class="cta" href="' + wa + '">Ativar no WhatsApp →</a>' +
      '<div class="codigo">Código de ativação: <b>' + code + '</b></div>';
  } else {
    const msg = ERROS[erro] || ERROS.inesperado;
    box.innerHTML =
      '<div class="check err">!</div>' +
      '<h1>Não deu pra conectar</h1>' +
      '<p>' + msg + '</p>' +
      '<a class="cta" href="index.html">Voltar ao início →</a>';
  }
</script>

</body>
</html>
